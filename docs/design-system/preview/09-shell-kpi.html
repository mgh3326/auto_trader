<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{margin:0;padding:18px;font-family:"Pretendard",system-ui,sans-serif;background:#F5F3EF;color:#242220}
  .shell{background:#fff;border:1px solid #D1CCC4;border-radius:1rem;box-shadow:0 18px 40px rgba(24,19,16,.08);overflow:hidden}
  .hdr{background:linear-gradient(120deg,#1A1A1A 0%,#2F2B28 50%,#45352E 100%);color:#F3EDE5;padding:14px 18px}
  .hdr h1{margin:0;font-size:1.25rem;letter-spacing:.02em}
  .hdr p{margin:.35rem 0 0;color:#D9CEC1;font-size:.9rem}
  .body{padding:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .kpi{border:1px solid #D1CCC4;border-radius:.75rem;background:#FCFBF8;padding:14px;text-align:center}
  .eye{font-size:.72rem;letter-spacing:.05em;text-transform:uppercase;color:#4F4A44;margin-bottom:4px}
  .v{font-size:1.5rem;font-weight:600;margin:0}
  .v.err{color:#B54A4A}.v.ok{color:#4A7C59}
</style></head><body>
<div class="shell">
  <div class="hdr"><h1>미체결 주문 현황</h1><p>전체 시장의 미체결 주문을 실시간으로 확인하세요.</p></div>
  <div class="body">
    <div class="kpi"><div class="eye">총 주문 수</div><p class="v">24</p></div>
    <div class="kpi"><div class="eye">매수 주문</div><p class="v err">14</p></div>
    <div class="kpi"><div class="eye">매도 주문</div><p class="v ok">10</p></div>
  </div>
</div>
</body></html>
