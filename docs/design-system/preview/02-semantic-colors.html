<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><title>Semantic Colors</title>
<style>
  body{margin:0;padding:16px;font-family:"Pretendard","Noto Sans KR",system-ui,sans-serif;background:#fff;color:#242220}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border:1px solid #D1CCC4;border-radius:10px;overflow:hidden}
  .chip{height:52px}
  .meta{padding:8px 10px;font-size:11px}
  .n{font-weight:600}.v{color:#4F4A44;font-family:ui-monospace,monospace;font-size:10.5px}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#C05A3C"></div><div class="meta"><div class="n">accent</div><div class="v">#C05A3C</div></div></div>
  <div class="sw"><div class="chip" style="background:#4A7C59"></div><div class="meta"><div class="n">success</div><div class="v">#4A7C59</div></div></div>
  <div class="sw"><div class="chip" style="background:#B54A4A"></div><div class="meta"><div class="n">error</div><div class="v">#B54A4A</div></div></div>
  <div class="sw"><div class="chip" style="background:#8D6E2F"></div><div class="meta"><div class="n">warn</div><div class="v">#8D6E2F</div></div></div>
  <div class="sw"><div class="chip" style="background:#1D5F7A"></div><div class="meta"><div class="n">info</div><div class="v">#1D5F7A</div></div></div>
</div>
<div class="row" style="margin-top:10px">
  <div class="sw"><div class="chip" style="background:#225F9C"></div><div class="meta"><div class="n">market KR</div><div class="v">#225F9C</div></div></div>
  <div class="sw"><div class="chip" style="background:#2F7A4F"></div><div class="meta"><div class="n">market US</div><div class="v">#2F7A4F</div></div></div>
  <div class="sw"><div class="chip" style="background:#80592F"></div><div class="meta"><div class="n">market Crypto</div><div class="v">#80592F</div></div></div>
  <div class="sw"><div class="chip" style="background:#9A1C1C"></div><div class="meta"><div class="n">profit (KR 상승)</div><div class="v">#9A1C1C</div></div></div>
  <div class="sw"><div class="chip" style="background:#0F4C9C"></div><div class="meta"><div class="n">loss (KR 하락)</div><div class="v">#0F4C9C</div></div></div>
</div>
</body></html>
