<!doctype html>
<html><head><meta charset="utf-8"><title>Surfaces</title>
<style>
  body{margin:0;padding:16px;font-family:"Pretendard","Noto Sans KR",system-ui,sans-serif;background:#fff;color:#242220}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .sw{border:1px solid #D1CCC4;border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
  .chip{height:64px}
  .meta{padding:8px 10px;font-size:11px;line-height:1.3}
  .n{font-weight:600;color:#242220}
  .v{color:#4F4A44;font-family:ui-monospace,Menlo,monospace;font-size:10.5px}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#F5F3EF"></div><div class="meta"><div class="n">bg-page</div><div class="v">#F5F3EF</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF;border-bottom:1px solid #D1CCC4"></div><div class="meta"><div class="n">bg-card</div><div class="v">#FFFFFF</div></div></div>
  <div class="sw"><div class="chip" style="background:#FCFBF8"></div><div class="meta"><div class="n">bg-panel</div><div class="v">#FCFBF8</div></div></div>
  <div class="sw"><div class="chip" style="background:#F4F2EC"></div><div class="meta"><div class="n">bg-subtle</div><div class="v">#F4F2EC</div></div></div>
  <div class="sw"><div class="chip" style="background:#F8F4EE"></div><div class="meta"><div class="n">bg-elev</div><div class="v">#F8F4EE</div></div></div>
  <div class="sw"><div class="chip" style="background:linear-gradient(120deg,#1A1A1A 0%,#2F2B28 50%,#45352E 100%)"></div><div class="meta"><div class="n">header gradient</div><div class="v">#1A1A1A→#45352E</div></div></div>
</div>
</body></html>
