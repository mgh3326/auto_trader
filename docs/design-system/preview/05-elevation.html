<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{margin:0;padding:28px;font-family:"Pretendard",system-ui,sans-serif;background:#F5F3EF;color:#242220}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .card{background:#fff;border:1px solid #D1CCC4;border-radius:14px;padding:16px;height:90px;display:flex;flex-direction:column;justify-content:space-between}
  .card .n{font-weight:600;font-size:13px}
  .card .v{font-family:ui-monospace,monospace;font-size:11px;color:#4F4A44;line-height:1.4}
  .e0{box-shadow:none}
  .e1{box-shadow:0 1px 2px rgba(24,19,16,.04)}
  .ec{box-shadow:0 18px 40px rgba(24,19,16,.08)}
  .btn{background:#C05A3C;color:#fff;border:1px solid #9F462D;border-radius:.6rem;padding:.45rem .8rem;font-size:.82rem;display:inline-block;box-shadow:0 8px 18px rgba(192,90,60,.25)}
</style></head><body>
<div class="row">
  <div class="card e0"><div class="n">elev-0</div><div class="v">none — panels</div></div>
  <div class="card e1"><div class="n">elev-1</div><div class="v">0 1px 2px rgba(24,19,16,.04)</div></div>
  <div class="card ec"><div class="n">elev-card</div><div class="v">0 18px 40px rgba(24,19,16,.08)</div></div>
</div>
<div style="margin-top:20px;font-size:11.5px;color:#4F4A44;letter-spacing:.05em;text-transform:uppercase;font-weight:600">CTA hover</div>
<div style="margin-top:8px"><span class="btn">Submit Order</span>  <span style="font-family:ui-monospace,monospace;font-size:11px;color:#4F4A44">elev-cta · 0 8px 18px rgba(192,90,60,.25)</span></div>
</body></html>
