<!doctype html>
<html><head><meta charset="utf-8">
<style>
  body{margin:0;padding:20px;font-family:"Pretendard",system-ui,sans-serif;background:#fff;color:#242220}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .lbl{font-size:11.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#4F4A44;width:110px}
  .bs{border-radius:999px;padding:.22rem .6rem;font-size:.78rem;border:1px solid;text-transform:lowercase}
  .q{color:#7A6332;border-color:rgba(122,99,50,.35);background:rgba(122,99,50,.08)}
  .r{color:#1D5F7A;border-color:rgba(29,95,122,.35);background:rgba(29,95,122,.08)}
  .c{color:#4A7C59;border-color:rgba(74,124,89,.35);background:rgba(74,124,89,.08)}
  .f{color:#B54A4A;border-color:rgba(181,74,74,.35);background:rgba(181,74,74,.08)}
  .side{display:inline-block;padding:.25rem .5rem;border-radius:.25rem;font-size:.75rem;font-weight:600;text-transform:uppercase}
  .buy{background:#fee2e2;color:#dc2626}
  .sell{background:#dbeafe;color:#2563eb}
  .mkt{border-radius:999px;font-size:.72rem;padding:.12rem .5rem;color:#fff}
  .kr{background:#225F9C}.us{background:#2F7A4F}.cr{background:#80592F}
  .ind{font-size:.7rem;padding:.15rem .35rem;background:#F0EEEA;border-radius:.25rem;font-family:ui-monospace,monospace}
</style></head><body>
<div class="row"><div class="lbl">Status</div>
  <span class="bs q">queued</span><span class="bs r">running</span><span class="bs c">completed</span><span class="bs f">failed</span>
</div>
<div class="row"><div class="lbl">Side</div><span class="side buy">BUY</span><span class="side sell">SELL</span></div>
<div class="row"><div class="lbl">Market</div><span class="mkt kr">KR</span><span class="mkt us">US</span><span class="mkt cr">CRYPTO</span></div>
<div class="row"><div class="lbl">Indicator</div><span class="ind">RSI14</span><span class="ind">MA20</span><span class="ind">VOL 1.2M</span></div>
</body></html>
