<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
  body{margin:0;padding:18px;font-family:"Pretendard",system-ui,sans-serif;background:#fff;color:#242220}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .ic{border:1px solid #D1CCC4;border-radius:.6rem;padding:12px;display:flex;flex-direction:column;align-items:center;gap:6px;background:#FCFBF8}
  .ic i{font-size:22px;color:#242220}
  .ic .n{font-size:11px;color:#4F4A44;font-family:ui-monospace,monospace}
  .note{margin-top:12px;font-size:.8rem;color:#4F4A44}
</style></head><body>
<div class="row">
  <div class="ic"><i class="bi bi-rocket-takeoff-fill" style="color:#C05A3C"></i><div class="n">brand</div></div>
  <div class="ic"><i class="bi bi-search"></i><div class="n">screener</div></div>
  <div class="ic"><i class="bi bi-clock-history"></i><div class="n">pending</div></div>
  <div class="ic"><i class="bi bi-wallet2"></i><div class="n">portfolio</div></div>
  <div class="ic"><i class="bi bi-people-fill"></i><div class="n">admin</div></div>
  <div class="ic"><i class="bi bi-box-arrow-right"></i><div class="n">logout</div></div>
</div>
<p class="note">Bootstrap Icons 1.11.3 — outline default, <code>-fill</code> for brand/emphasis only. No emoji.</p>
</body></html>
