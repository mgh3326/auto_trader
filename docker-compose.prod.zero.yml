services:
  api_blue:
    extends:
      file: docker-compose.prod.yml
      service: api
    image: ${AUTO_TRADER_RUNTIME_IMAGE:-ghcr.io/${GITHUB_REPOSITORY}:production}
    container_name: auto_trader_api_blue_prod
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:api",
        "--host",
        "0.0.0.0",
        "--port",
        "18000",
      ]
    ports: []
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:18000/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api_green:
    extends:
      file: docker-compose.prod.yml
      service: api
    image: ${AUTO_TRADER_RUNTIME_IMAGE:-ghcr.io/${GITHUB_REPOSITORY}:production}
    container_name: auto_trader_api_green_prod
    command:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:api",
        "--host",
        "0.0.0.0",
        "--port",
        "18001",
      ]
    ports: []
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:18001/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp_blue:
    extends:
      file: docker-compose.prod.yml
      service: mcp
    image: ${AUTO_TRADER_RUNTIME_IMAGE:-ghcr.io/${GITHUB_REPOSITORY}:production}
    container_name: auto_trader_mcp_blue_prod
    environment:
      MCP_TYPE: ${MCP_TYPE:-streamable-http}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: 18650
      MCP_PATH: ${MCP_PATH:-/mcp}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}

  mcp_green:
    extends:
      file: docker-compose.prod.yml
      service: mcp
    image: ${AUTO_TRADER_RUNTIME_IMAGE:-ghcr.io/${GITHUB_REPOSITORY}:production}
    container_name: auto_trader_mcp_green_prod
    environment:
      MCP_TYPE: ${MCP_TYPE:-streamable-http}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: 18651
      MCP_PATH: ${MCP_PATH:-/mcp}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-}

  worker_blue:
    extends:
      file: docker-compose.prod.yml
      service: worker
    image: ${AUTO_TRADER_RUNTIME_IMAGE:-ghcr.io/${GITHUB_REPOSITORY}:production}
    container_name: auto_trader_worker_blue_prod

  worker_green:
    extends:
      file: docker-compose.prod.yml
      service: worker
    image: ${AUTO_TRADER_RUNTIME_IMAGE:-ghcr.io/${GITHUB_REPOSITORY}:production}
    container_name: auto_trader_worker_green_prod
