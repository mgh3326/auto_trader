name: PR Discord Notification

on:
  pull_request:
    types: [opened, reopened, ready_for_review, review_requested, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Discord PR notification
        env:
          DISCORD_PR_WEBHOOK_URL: ${{ secrets.DISCORD_PR_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_ACTION: ${{ github.event.action }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_FILES: ${{ github.event.pull_request.changed_files }}
          PR_ADDITIONS: ${{ github.event.pull_request.additions }}
          PR_DELETIONS: ${{ github.event.pull_request.deletions }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          REQUESTED_REVIEWER: ${{ github.event.requested_reviewer.login }}
          REQUESTED_TEAM: ${{ github.event.requested_team.name }}
          REPO: ${{ github.repository }}
        run: |
          WEBHOOK_URL="${DISCORD_PR_WEBHOOK_URL:-$DISCORD_WEBHOOK_URL}"
          if [ -z "$WEBHOOK_URL" ]; then
            echo "No Discord webhook configured"
            exit 1
          fi

          # draft PR opened/reopenedлҠ” м ңмҷё, ready_for_review л•Ң м•ҢлҰј
          if [ "$PR_DRAFT" = "true" ] && { [ "$PR_ACTION" = "opened" ] || [ "$PR_ACTION" = "reopened" ]; }; then
            echo "Skip draft PR notification for action=$PR_ACTION"
            exit 0
          fi

          COLOR=3447003
          case "$PR_ACTION" in
            opened)
              TITLE="рҹҶ• мғҲ PR"
              ;;
            reopened)
              TITLE="рҹ”„ PR мһ¬мҳӨн”Ҳ"
              ;;
            ready_for_review)
              TITLE="рҹ‘Җ PR лҰ¬л·° мӨҖл№„ мҷ„лЈҢ"
              ;;
            review_requested)
              TITLE="рҹҷӢ лҰ¬л·° мҡ”мІӯ"
              COLOR=15844367
              ;;
            closed)
              if [ "$PR_MERGED" = "true" ]; then
                TITLE="вң… PR лЁём§Җ мҷ„лЈҢ"
                COLOR=5763719
              else
                TITLE="рҹ—‘пёҸ PR мў…лЈҢ"
                COLOR=9807270
              fi
              ;;
            *)
              TITLE="рҹ“Ӣ PR м—…лҚ°мқҙнҠё"
              ;;
          esac

          REVIEW_LINE=""
          if [ "$PR_ACTION" = "review_requested" ]; then
            if [ -n "$REQUESTED_REVIEWER" ]; then
              REVIEW_LINE=$(printf '\n**Reviewer:** @%s' "$REQUESTED_REVIEWER")
            elif [ -n "$REQUESTED_TEAM" ]; then
              REVIEW_LINE=$(printf '\n**Reviewer Team:** %s' "$REQUESTED_TEAM")
            fi
          fi

          DESCRIPTION=$(printf '%s\n%s\n%s%s' \
            "**Author:** $PR_AUTHOR" \
            "**Branch:** \`$PR_HEAD\` вҶ’ \`$PR_BASE\`" \
            "**Changed files:** $PR_FILES  |  +$PR_ADDITIONS / -$PR_DELETIONS" \
            "$REVIEW_LINE")

          jq -n \
            --arg title "$TITLE: #$PR_NUMBER $PR_TITLE" \
            --arg url "$PR_URL" \
            --arg description "$DESCRIPTION" \
            --arg footer "$REPO" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson color "$COLOR" \
            '{embeds:[{title:$title,url:$url,description:$description,color:$color,footer:{text:$footer},timestamp:$timestamp}]}' \
          | curl -s -H "Content-Type: application/json" -d @- "$WEBHOOK_URL"
