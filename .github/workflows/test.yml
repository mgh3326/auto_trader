name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.13"

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install UV
      run: pip install uv

    - name: Load cached venv
      id: cached-uv-dependencies
      uses: actions/cache@v5
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: uv sync --group dev

    - name: Run Ruff linter
      run: uv run ruff check app/ tests/

    - name: Run Ruff formatter check
      run: uv run ruff format --check app/ tests/

    - name: Run ty
      run: uv run ty check app/ --error-on-warning

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.13"]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install UV
      run: pip install uv

    - name: Load cached venv
      id: cached-uv-dependencies
      uses: actions/cache@v5
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: uv sync --group test
    
    - name: Set environment variables from env.example
      run: |
        chmod +x scripts/setup-test-env.sh
        bash scripts/setup-test-env.sh

    - name: Run tests
      run: |
        uv run pytest tests/ -m "not live" -n auto --dist=loadfile -ra --durations=25 --durations-min=1.0 -o faulthandler_timeout=120 --cov=app --cov-report=xml --cov-fail-under=30

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: coverage.xml
        disable_search: true

  taskiq-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHON_VERSION: "3.13"

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install UV
      run: pip install uv

    - name: Load cached venv
      id: cached-uv-dependencies
      uses: actions/cache@v5
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: uv sync --group test

    - name: Set environment variables from env.example
      run: |
        chmod +x scripts/setup-test-env.sh
        bash scripts/setup-test-env.sh

    - name: TaskIQ worker smoke test
      run: |
        set -euo pipefail
        status=0
        timeout --signal=TERM --kill-after=5s 30s uv run taskiq worker app.core.taskiq_broker:broker app.tasks > taskiq-worker.log 2>&1 || status=$?
        if [[ "$status" -ne 124 && "$status" -ne 137 ]]; then
          echo "TaskIQ worker smoke test failed: unexpected exit code $status."
          tail -n 200 taskiq-worker.log || true
          exit 1
        fi
        if ! grep -Fq "Listening started." taskiq-worker.log; then
          echo "TaskIQ worker smoke test failed: startup marker not found."
          tail -n 200 taskiq-worker.log || true
          exit 1
        fi

    - name: TaskIQ scheduler smoke test
      run: |
        set -euo pipefail
        status=0
        timeout --signal=TERM --kill-after=5s 30s uv run taskiq scheduler app.core.scheduler:sched app.tasks --skip-first-run > taskiq-scheduler.log 2>&1 || status=$?
        if [[ "$status" -ne 124 && "$status" -ne 137 ]]; then
          echo "TaskIQ scheduler smoke test failed: unexpected exit code $status."
          tail -n 200 taskiq-scheduler.log || true
          exit 1
        fi
        if ! grep -Fq "Startup completed." taskiq-scheduler.log; then
          echo "TaskIQ scheduler smoke test failed: startup marker not found."
          tail -n 200 taskiq-scheduler.log || true
          exit 1
        fi

    - name: Upload TaskIQ smoke logs
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: taskiq-smoke-logs-${{ env.PYTHON_VERSION }}
        path: |
          taskiq-worker.log
          taskiq-scheduler.log
        if-no-files-found: warn

  security:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.13"

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install UV
      run: pip install uv

    - name: Load cached venv
      id: cached-uv-dependencies
      uses: actions/cache@v5
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/uv.lock') }}

    - name: Install dependencies
      run: uv sync --group dev

    - name: Run security checks
      run: |
        uv run bandit -r app/ -f json -o bandit-report.json || true
        uv run safety check --json --output safety-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v6
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  notify:
    if: failure()
    needs: [lint, test, taskiq-smoke, security]
    runs-on: ubuntu-latest
    steps:
      - name: Discord failure notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ Test CI 실패\",
                \"description\": \"**Branch:** \`${{ github.ref_name }}\`\n**Commit:** \`${GITHUB_SHA::7}\`\n**Author:** ${{ github.actor }}\n**Trigger:** ${{ github.event_name }}\",
                \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                \"color\": 16711680,
                \"footer\": {\"text\": \"${{ github.repository }}\"},
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            "$DISCORD_WEBHOOK"
