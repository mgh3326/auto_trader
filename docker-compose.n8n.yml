# n8n 워크플로우 자동화 (별도 compose — caddy와 동일 패턴)
# 배포: docker compose -f docker-compose.n8n.yml up -d
services:
  n8n:
    image: n8nio/n8n:2.11.4
    container_name: auto_trader_n8n_prod
    restart: unless-stopped
    network_mode: host # auto_trader API/MCP에 localhost로 직접 접근
    environment:
      - N8N_HOST=localhost
      - N8N_LISTEN_ADDRESS=127.0.0.1
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - QUEUE_HEALTH_CHECK_ACTIVE=true
      - NODES_EXCLUDE=[]  # n8n v2는 executeCommand를 기본 비활성화. 내부 전용이므로 허용
    volumes:
      - ./n8n/data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.1'
