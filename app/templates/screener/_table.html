<article class="panel" id="results-panel">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h2>Results</h2>
        <span class="subtle" id="result-stats">0 rows</span>
    </div>
    <div class="results-table-wrap">
        <table class="table table-sm table-striped results-table" id="results-table">
            <thead>
            <tr>
                <th>Symbol</th>
                <th>Name</th>
                <th>Price</th>
                <th>Change</th>
                <th>Volume</th>
                <th>Report</th>
            </tr>
            </thead>
            <tbody id="results-body"></tbody>
        </table>
    </div>
    <p class="muted-block mt-2 mb-0" id="results-message" aria-live="polite">
        Load screen data to start report generation.
    </p>
</article>
