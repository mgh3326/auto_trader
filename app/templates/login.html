{% extends "base.html" %}

{% block title %}로그인 - Auto Trader{% endblock %}

{% block head_extra %}
<link rel="stylesheet" href="/static/css/auth.css">
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>로그인</h1>
        <p>Auto Trader에 오신 것을 환영합니다</p>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/web-auth/login">
            <input type="hidden" name="csrftoken" value="{{ request.state.csrftoken }}">
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
            <div class="form-group">
                <label for="username">사용자명</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    autocomplete="username"
                    required
                    autofocus
                    placeholder="사용자명을 입력하세요"
                >
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    autocomplete="current-password"
                    required
                    placeholder="비밀번호를 입력하세요"
                >
            </div>

            <button type="submit" class="btn-primary">로그인</button>
        </form>

        <div class="divider">또는</div>

        <div class="register-link">
            계정이 없으신가요? <a href="/web-auth/register">회원가입</a>
        </div>
    </div>
</div>
{% endblock %}
